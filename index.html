<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you 💗</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(12px) brightness(40%);
  z-index: -2;
}

/* container */
.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 20px;
  text-align: center;
}

/* FRAME FOTO (ANTI GOYANG) */
.photo-frame {
  width: 260px;
  height: 260px;
  margin: 0 auto 20px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 20px #ff4d6d;
}

.photo-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* title */
h1 {
  font-size: 34px;
  color: #ff4d6d;
  text-shadow: 0 0 10px #ff4d6d;
}

/* TYPEWRITER TEXT */
#text {
  font-size: 17px;
  line-height: 1.9;
  color: #ddd;
  text-align: left;
  white-space: pre-line;
  margin-top: 20px;
  min-height: 200px;
}

/* cursor */
.cursor {
  display: inline-block;
  width: 2px;
  background: white;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100% {opacity: 0;}
  50% {opacity: 1;}
}

/* button */
button {
  margin-top: 30px;
  padding: 12px 22px;
  border-radius: 25px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 10px #ff4d6d;
}

/* hearts */
.heart {
  position: fixed;
  color: #ff4d6d;
  animation: floatUp 5s linear infinite;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* responsive */
@media(max-width:768px){
  h1 { font-size: 26px; }
  #text { font-size: 15px; }
  .photo-frame { width: 200px; height: 200px; }
}
</style>
</head>

<body>

<img id="bg" class="bg" src="couple1.jpeg">

<div class="container">

  <div class="photo-frame">
    <img id="mainPhoto" src="couple1.jpeg">
  </div>

  <h1>happy birthday 💗</h1>

  <div id="text"></div>

  <button onclick="start()">tap me 🎧</button>

</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
const fullText = `happy birthday amaaa 🎂✨  
finally… another level unlocked, sekarang udah temen level 2 hehe  

semoga di umur yang sekarang everything gets better ya—lebih banyak hal baik, lebih banyak bahagia, dan pelan-pelan semua yang lu harapin bisa ke kejar.


jujur ya, walaupun kita sekarang cuma temen, gua gak bohong… gua selalu ngeliat lu lebih dari itu. maybe it was just the wrong timing, atau mungkin perasaan gua aja yang terlalu jauh. tapi yaudah, gua gak mau bikin jadi aneh juga.


gua cuma mau bilang makasih—buat waktu, obrolan, dan hal-hal kecil yang pernah kita lewatin. mungkin keliatannya biasa aja, tapi jujur itu ada artinya buat gua.  

makasih juga udah pernah hadir di hidup gua, udah pernah perhatian, dan nemenin di beberapa momen. i really appreciate that.


biarpun kadang lu suka lemot dikit 😭 tapi jujur gua suka sisi lu yang itu, makanya gua juga suka aja ngeledekin lu 😜


dan mungkin setelah semua itu, gua juga belajar buat lebih nerima keadaan. apapun nanti keputusan lu, gua gak bakal benci lu kok. cuma ya… gua juga gak bisa bohong kalau masih ada sedikit harapan di gua.

tapi di sisi lain, gua juga gak mau maksa apapun. jadi yaudah, kita jalanin aja se-natural mungkin.


dan jangan jadi orang asing ya. kalo suatu saat lu butuh temen cerita atau sekedar butuh ditemenin, gua masih ada—santai aja, no pressure.


anyway, enjoy your day ya. hari ini jangan overthink dulu, just be happy ✨


note: tadinya mau full english biar keliatan keren dikit, tapi gua inget lu… yaudah lah ya 😜`;

let index = 0;
let speed = 30;

function start() {
  document.getElementById("music").play();
  typeWriter();
}

function typeWriter() {
  if (index < fullText.length) {
    document.getElementById("text").innerHTML += fullText.charAt(index);
    index++;
    setTimeout(typeWriter, speed);
  }
}

/* slideshow */
const images = ["couple1.jpeg","couple2.jpeg","couple3.jpeg"];
let i = 0;

setInterval(() => {
  i = (i + 1) % images.length;
  document.getElementById("bg").src = images[i];
  document.getElementById("mainPhoto").src = images[i];
}, 4000);

/* hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
